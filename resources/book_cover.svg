<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1800px" height="2700px" viewBox="0 0 1800 2700"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Define drop shadow filter -->
  <defs>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="2" dy="3" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>


  <!-- Background texture (red) -->
  <image x="0" y="0" width="1800" height="2700"
         xlink:href="redcover.jpg"
         preserveAspectRatio="xMidYMid slice"/>

  <!-- Title Block (upper 40%) - centered at 20% -->
  <text filter="url(#dropShadow)"
        style="font-family: 'Ubuntu', 'Lato', 'DejaVu Sans', sans-serif;
               font-weight: 400;
               font-size: 260px;
               fill: white;">
    <tspan x="900" y="540" text-anchor="middle">The</tspan>
    <tspan x="900" y="864" text-anchor="middle">BEAM</tspan>
    <tspan x="900" y="1188" text-anchor="middle">Book</tspan>
  </text>

  <!-- Horizontal Rule (50% height) -->
  <line x1="360" y1="1350" x2="1440" y2="1350"
        stroke="white"
        stroke-width="2"
        opacity="0.4"/>

  <!-- Subtitle (59% height) -->
  <text style="font-family: 'Ubuntu', 'Lato', 'DejaVu Sans', sans-serif;
               font-weight: 400;
               font-size: 120px;
               fill: white;">
    <tspan x="900" y="1590" text-anchor="middle">Understanding the Erlang</tspan>
    <tspan x="900" y="1730" text-anchor="middle">Runtime System</tspan>
  </text>


  <!-- Author (85% height) -->
  <text x="900" y="2295" text-anchor="middle"
        filter="url(#dropShadow)"
        style="font-family: 'Ubuntu', 'DejaVu Sans', sans-serif;
               font-weight: 700;
               font-size: 130px;
               fill: white;">
    Erik Stenman
  </text>

  <!-- Publisher mark (bottom-right corner) -->
  <image x="1230" y="2400" width="480" height="88"
         xlink:href="hh_publisher_mark.png"
         preserveAspectRatio="xMidYMid meet"
         opacity="0.45"/>

</svg>